name: Playwright Tests

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  #schedule:
    #- cron: '0 12 * * 1-5'  # Lunes a viernes a las 7am hora Colombia

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      # ─── Checkout del código ───────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ─── Setup Node.js ─────────────────────────────────────────────────────
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      # ─── Instalar dependencias ─────────────────────────────────────────────
      - name: Install dependencies
        run: npm ci

      # ─── Instalar browsers de Playwright ──────────────────────────────────
      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps

      # ─── Correr los tests ──────────────────────────────────────────────────
      - name: Run Playwright tests
        env:
          BASE_URL: ${{ secrets.BASE_URL }}
          TEST_USER: ${{ secrets.TEST_USER }}
          TEST_PASSWORD: ${{ secrets.TEST_PASSWORD }}
        run: npx playwright test

      # ─── Publicar reporte HTML como artifact ──────────────────────────────
      - name: Upload HTML report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: reports/html/
          retention-days: 15

      # ─── Generar reporte Allure ────────────────────────────────────────────
      - name: Generate Allure report
        if: always()
        run: npx allure generate reports/allure-results --clean -o reports/allure-report

      # ─── Preparar GitHub Pages ─────────────────────────────────────────────
      - name: Setup Pages
        if: always()
        uses: actions/configure-pages@v4

      # ─── Subir reporte como artifact de Pages ─────────────────────────────
      - name: Upload Pages artifact
        if: always()
        uses: actions/upload-pages-artifact@v3
        with:
          path: reports/allure-report/

  # ─── Job de deploy a GitHub Pages ─────────────────────────────────────────
  # Va separado del job de test porque Pages lo requiere así
  deploy:
    needs: test
    runs-on: ubuntu-latest
    if: always()

    permissions:
      pages: write
      id-token: write

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4